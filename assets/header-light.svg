<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <rect width="1200" height="300" fill="#fafafa"/>

  <!-- Gradient accent strip -->
  <rect x="0" y="0" width="1200" height="4" fill="#E8553D"/>

  <!-- Floating geometric accents -->
  <circle cx="1050" cy="80" r="60" fill="#E8553D" opacity="0.06"/>
  <circle cx="1100" cy="150" r="90" fill="#E8553D" opacity="0.04"/>
  <circle cx="150" cy="250" r="40" fill="#0EA5E9" opacity="0.05"/>
  <rect x="80" y="60" width="3" height="40" rx="1.5" fill="#E8553D" opacity="0.3"/>
  <rect x="90" y="75" width="3" height="25" rx="1.5" fill="#0EA5E9" opacity="0.2"/>

  <!-- Name -->
  <text x="120" y="155" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#111" letter-spacing="-2">Dani Almalaki</text>

  <!-- Tagline -->
  <text x="124" y="195" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="15" fill="#666" letter-spacing="0.5">building things that make data feel good</text>

  <!-- Decorative dots -->
  <circle cx="124" cy="230" r="4" fill="#E8553D"/>
  <circle cx="140" cy="230" r="4" fill="#0EA5E9"/>
  <circle cx="156" cy="230" r="4" fill="#111" opacity="0.2"/>

  <!-- Mini bar chart decoration -->
  <rect x="900" y="160" width="16" height="50" rx="3" fill="#E8553D" opacity="0.15"/>
  <rect x="922" y="140" width="16" height="70" rx="3" fill="#E8553D" opacity="0.25"/>
  <rect x="944" y="115" width="16" height="95" rx="3" fill="#E8553D" opacity="0.7"/>
  <rect x="966" y="130" width="16" height="80" rx="3" fill="#E8553D" opacity="0.4"/>
  <rect x="988" y="150" width="16" height="60" rx="3" fill="#E8553D" opacity="0.2"/>
  <rect x="1010" y="165" width="16" height="45" rx="3" fill="#0EA5E9" opacity="0.3"/>
  <rect x="1032" y="145" width="16" height="65" rx="3" fill="#0EA5E9" opacity="0.15"/>

  <!-- Axis line under bars -->
  <line x1="895" y1="215" x2="1055" y2="215" stroke="#ddd" stroke-width="1"/>
  <text x="900" y="232" font-family="'SF Mono', monospace" font-size="8" fill="#aaa">16mm  24  35  50  85  135  200</text>
</svg>
