<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" fill="none">
  <rect width="1200" height="340" fill="#ffffff"/>

  <!-- Chaotic scattered blobs -->
  <circle cx="180" cy="40" r="35" fill="#bae6fd" opacity="0.4"/>
  <circle cx="1050" cy="280" r="50" fill="#fde68a" opacity="0.35"/>
  <circle cx="950" cy="50" r="25" fill="#fbcfe8" opacity="0.5"/>
  <circle cx="400" cy="300" r="40" fill="#d1fae5" opacity="0.3"/>
  <circle cx="700" cy="30" r="20" fill="#7dd3fc" opacity="0.3"/>
  <circle cx="1150" cy="120" r="30" fill="#d1fae5" opacity="0.35"/>
  <circle cx="80" cy="180" r="18" fill="#fde68a" opacity="0.4"/>
  <circle cx="550" cy="310" r="28" fill="#bae6fd" opacity="0.25"/>
  <circle cx="1100" cy="60" r="15" fill="#fbcfe8" opacity="0.4"/>

  <!-- Scattered fun shapes -->
  <rect x="300" y="20" width="12" height="12" rx="2" fill="#7dd3fc" opacity="0.5" transform="rotate(35 306 26)"/>
  <rect x="850" y="290" width="10" height="10" rx="2" fill="#fde68a" opacity="0.6" transform="rotate(-20 855 295)"/>
  <rect x="1000" y="150" width="8" height="8" rx="2" fill="#86efac" opacity="0.5" transform="rotate(50 1004 154)"/>
  <rect x="150" y="280" width="14" height="14" rx="3" fill="#fbcfe8" opacity="0.4" transform="rotate(15 157 287)"/>

  <!-- Stars / sparkles -->
  <polygon points="650,60 653,53 656,60 663,60 657,65 659,72 653,67 647,72 649,65 643,60" fill="#fde68a" opacity="0.6"/>
  <polygon points="1080,200 1082,196 1084,200 1088,200 1085,203 1086,207 1082,204 1078,207 1079,203 1076,200" fill="#7dd3fc" opacity="0.5"/>
  <polygon points="100" fill="#86efac"/>

  <!-- Wavy line decoration -->
  <path d="M 0 320 Q 150 300 300 315 Q 450 330 600 310 Q 750 290 900 315 Q 1050 340 1200 310" stroke="#bae6fd" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M 0 330 Q 200 310 400 325 Q 600 340 800 320 Q 1000 300 1200 325" stroke="#fde68a" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Name — big and off-center -->
  <text x="80" y="160" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="900" fill="#1e293b" letter-spacing="-3">dani almalaki</text>

  <!-- Chaotic tagline bits scattered around -->
  <text x="85" y="200" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="13" fill="#94a3b8">cs @ uw-madison</text>
  <text x="290" y="200" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="13" fill="#7dd3fc">·</text>
  <text x="310" y="200" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="13" fill="#94a3b8">photographer</text>
  <text x="445" y="200" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="13" fill="#7dd3fc">·</text>
  <text x="465" y="200" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="13" fill="#94a3b8">data viz nerd</text>

  <!-- Fun annotation arrows / doodles -->
  <text x="700" y="140" font-family="'SF Mono', monospace" font-size="11" fill="#38bdf8" opacity="0.7">← currently adding ML to things</text>
  <text x="700" y="165" font-family="'SF Mono', monospace" font-size="11" fill="#86efac" opacity="0.7">← too many camera lenses</text>
  <text x="700" y="190" font-family="'SF Mono', monospace" font-size="11" fill="#fbbf24" opacity="0.7">← amazon intern summer '26</text>

  <!-- Colorful dots cluster -->
  <circle cx="85" cy="240" r="6" fill="#7dd3fc"/>
  <circle cx="103" cy="237" r="4" fill="#fde68a"/>
  <circle cx="117" cy="242" r="5" fill="#86efac"/>
  <circle cx="134" cy="238" r="3.5" fill="#fbcfe8"/>
  <circle cx="146" cy="243" r="4.5" fill="#bae6fd"/>
