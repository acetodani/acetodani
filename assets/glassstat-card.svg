<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <!-- White card with soft border -->
  <rect width="1200" height="280" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Soft background blobs -->
  <circle cx="1050" cy="60" r="100" fill="#e0f2fe" opacity="0.4"/>
  <circle cx="1150" cy="200" r="60" fill="#fef3c7" opacity="0.3"/>
  <circle cx="900" cy="250" r="50" fill="#d1fae5" opacity="0.3"/>

  <!-- Label -->
  <rect x="50" y="35" width="8" height="8" rx="2" fill="#7dd3fc" transform="rotate(12 54 39)"/>
  <text x="68" y="44" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="10" fill="#38bdf8" letter-spacing="1.5">FEATURED</text>

  <!-- Project name + description -->
  <text x="50" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#1e293b" letter-spacing="-1">glassstat</text>
  <text x="275" y="90" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8">— spotify wrapped for your camera gear</text>

  <text x="50" y="125" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">scan your photos, see how you actually shoot. focal lengths, aperture habits, archetypes, best-photo scoring.</text>
  <text x="50" y="148" font-family="system-ui, sans-serif" font-size="12" fill="#86efac">privacy-first · nothing leaves your machine</text>

  <!-- Tech pills -->
  <rect x="50" y="170" width="58" height="22" rx="11" fill="#e0f2fe"/>
  <text x="63" y="185" font-family="'SF Mono', monospace" font-size="9" fill="#0284c7">Python</text>

  <rect x="116" y="170" width="62" height="22" rx="11" fill="#e0f2fe"/>
  <text x="127" y="185" font-family="'SF Mono', monospace" font-size="9" fill="#0284c7">FastAPI</text>

  <rect x="186" y="170" width="52" height="22" rx="11" fill="#d1fae5"/>
  <text x="197" y="185" font-family="'SF Mono', monospace" font-size="9" fill="#059669">React</text>

  <rect x="246" y="170" width="40" height="22" rx="11" fill="#fef3c7"/>
  <text x="254" y="185" font-family="'SF Mono', monospace" font-size="9" fill="#d97706">TS</text>

  <rect x="294" y="170" width="45" height="22" rx="11" fill="#fce7f3"/>
  <text x="304" y="185" font-family="'SF Mono', monospace" font-size="9" fill="#db2777">CLIP</text>

  <!-- Stats -->
  <text x="50" y="240" font-family="'SF Mono', monospace" font-size="24" font-weight="700" fill="#1e293b">29</text>
  <text x="88" y="240" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8">endpoints</text>

  <text x="180" y="240" font-family="'SF Mono', monospace" font-size="24" font-weight="700" fill="#1e293b">400+</text>
  <text x="240" y="240" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8">formats</text>

  <text x="320" y="240" font-family="'SF Mono', monospace" font-size="24" font-weight="700" fill="#1e293b">7</text>
  <text x="340" y="240" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8">archetypes</text>

  <!-- Right side: mini bars -->
  <rect x="820" y="70" width="16" height="80" rx="8" fill="#e0f2fe"/>
  <rect x="844" y="50" width="16" height="100" rx="8" fill="#bae6fd"/>
  <rect x="868" y="25" width="16" height="125" rx="8" fill="#7dd3fc"/>
  <rect x="892" y="40" width="16" height="110" rx="8" fill="#38bdf8"/>
  <rect x="916" y="60" width="16" height="90" rx="8" fill="#bae6fd"/>
  <rect x="940" y="75" width="16" height="75" rx="8" fill="#86efac"/>
  <rect x="964" y="85" width="16" height="65" rx="8" fill="#d1fae5"/>
  <rect x="988" y="95" width="16" height="55" rx="8" fill="#fde68a"/>

  <text x="820" y="165" font-family="'SF Mono', monospace" font-size="8" fill="#94a3b8">focal length distribution</text>

  <!-- Activity mini sparkline -->
  <polyline points="820,220 845,215 870,210 895,200 920,190 945,185 970,182 995,188 1020,192 1045,195" stroke="#7dd3fc" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="820" y="245" font-family="'SF Mono', monospace" font-size="8" fill="#94a3b8">12-month activity</text>
</svg>
