<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <!-- Card background — white -->
  <rect width="1200" height="400" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Soft blobs -->
  <circle cx="1000" cy="80" r="160" fill="#bae6fd" opacity="0.12"/>
  <circle cx="750" cy="370" r="100" fill="#fde68a" opacity="0.1"/>
  <circle cx="1150" cy="320" r="80" fill="#d1fae5" opacity="0.1"/>

  <!-- Left content -->
  <text x="60" y="55" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="11" fill="#38bdf8" letter-spacing="2">FEATURED PROJECT</text>

  <text x="60" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#1e293b" letter-spacing="-1">glassstat</text>
  <text x="60" y="148" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">Spotify Wrapped for your camera gear</text>

  <text x="60" y="198" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Scan your photo library and discover how you actually shoot.</text>
  <text x="60" y="220" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Focal length habits, aperture patterns, time-of-day heatmaps,</text>
  <text x="60" y="242" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">photographer archetype classification, and a best-photo score.</text>

  <!-- Gradient underline -->
  <rect x="60" y="265" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <text x="60" y="290" font-family="system-ui, sans-serif" font-size="13" fill="#34d399">Privacy-first — your photos never leave your machine.</text>

  <!-- Stats row -->
  <text x="60" y="345" font-family="'SF Mono', monospace" font-size="30" font-weight="700" fill="#1e293b">29</text>
  <text x="108" y="345" font-family="'SF Mono', monospace" font-size="11" fill="#94a3b8">endpoints</text>

  <text x="210" y="345" font-family="'SF Mono', monospace" font-size="30" font-weight="700" fill="#1e293b">400+</text>
  <text x="288" y="345" font-family="'SF Mono', monospace" font-size="11" fill="#94a3b8">formats</text>

  <text x="380" y="345" font-family="'SF Mono', monospace" font-size="30" font-weight="700" fill="#1e293b">7</text>
  <text x="405" y="345" font-family="'SF Mono', monospace" font-size="11" fill="#94a3b8">archetypes</text>

  <!-- Right side: mini dashboard -->

  <!-- Focal length bars card -->
  <rect x="680" y="40" width="460" height="185" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="710" y="68" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="1">FOCAL LENGTH</text>

  <rect x="710" y="88" width="22" height="115" rx="11" fill="#e0f2fe"/>
  <rect x="742" y="68" width="22" height="135" rx="11" fill="#bae6fd"/>
  <rect x="774" y="40" width="22" height="163" rx="11" fill="#38bdf8"/>
  <rect x="806" y="55" width="22" height="148" rx="11" fill="#7dd3fc"/>
  <rect x="838" y="80" width="22" height="123" rx="11" fill="#bae6fd"/>
  <rect x="870" y="88" width="22" height="115" rx="11" fill="#86efac"/>
  <rect x="902" y="100" width="22" height="103" rx="11" fill="#d1fae5"/>
  <rect x="934" y="112" width="22" height="91" rx="11" fill="#fde68a"/>
  <rect x="966" y="125" width="22" height="78" rx="11" fill="#fef3c7"/>
  <rect x="998" y="140" width="22" height="63" rx="11" fill="#fbcfe8" opacity="0.6"/>

  <text x="710" y="218" font-family="'SF Mono', monospace" font-size="8" fill="#94a3b8">16    24    35    50    70    85   100   135   200   400mm</text>

  <!-- Activity sparkline card -->
  <rect x="680" y="240" width="220" height="110" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="710" y="268" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="1">ACTIVITY</text>
  <polyline points="710,335 730,330 750,325 770,318 790,308 810,295 830,288 850,282 870,290 880,295" stroke="#7dd3fc" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="710,335 730,330 750,325 770,318 790,308 810,295 830,288 850,282 870,290 880,295 880,340 710,340" fill="#bae6fd" opacity="0.2"/>

  <!-- Top lens card -->
  <rect x="915" y="240" width="225" height="110" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="940" y="268" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8" letter-spacing="1">TOP LENS</text>
  <text x="940" y="298" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">35mm f/1.4 GM</text>
  <text x="940" y="318" font-family="'SF Mono', monospace" font-size="11" fill="#94a3b8">4,231 shots</text>
  <rect x="940" y="328" width="175" height="5" rx="2.5" fill="#e2e8f0"/>
  <rect x="940" y="328" width="175" height="5" rx="2.5" fill="url(#accent)"/>
</svg>
