<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006CB7"/>
      <stop offset="100%" stop-color="#00852B"/>
    </linearGradient>
  </defs>

  <!-- White card -->
  <rect width="900" height="220" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Label -->
  <circle cx="42" cy="30" r="5" fill="#E3000B"/>
  <text x="54" y="34" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="10" fill="#E3000B" letter-spacing="1.5">FEATURED</text>

  <!-- Project name -->
  <text x="36" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#1a1a1a" letter-spacing="-1">glassstat</text>
  <text x="230" y="78" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">— spotify wrapped for your camera gear</text>

  <!-- Description -->
  <text x="36" y="108" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">scan your photos, see how you actually shoot. focal lengths, aperture habits, archetypes, scoring.</text>
  <text x="36" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#00852B">privacy-first · nothing leaves your machine</text>

  <!-- Tech pills in lego colors -->
  <rect x="36" y="145" width="58" height="20" rx="10" fill="#006CB7" opacity="0.12"/>
  <text x="49" y="159" font-family="'SF Mono', monospace" font-size="9" fill="#006CB7">Python</text>

  <rect x="100" y="145" width="62" height="20" rx="10" fill="#00852B" opacity="0.12"/>
  <text x="112" y="159" font-family="'SF Mono', monospace" font-size="9" fill="#00852B">FastAPI</text>

  <rect x="168" y="145" width="50" height="20" rx="10" fill="#E3000B" opacity="0.12"/>
  <text x="179" y="159" font-family="'SF Mono', monospace" font-size="9" fill="#E3000B">React</text>

  <rect x="224" y="145" width="36" height="20" rx="10" fill="#F5CD2F" opacity="0.2"/>
  <text x="232" y="159" font-family="'SF Mono', monospace" font-size="9" fill="#b8860b">TS</text>

  <rect x="266" y="145" width="42" height="20" rx="10" fill="#FF6D00" opacity="0.12"/>
  <text x="275" y="159" font-family="'SF Mono', monospace" font-size="9" fill="#FF6D00">CLIP</text>

  <!-- Stats -->
  <text x="36" y="198" font-family="'SF Mono', monospace" font-size="20" font-weight="700" fill="#1a1a1a">29</text>
  <text x="68" y="198" font-family="'SF Mono', monospace" font-size="9" fill="#9ca3af">endpoints</text>

  <text x="155" y="198" font-family="'SF Mono', monospace" font-size="20" font-weight="700" fill="#1a1a1a">400+</text>
  <text x="205" y="198" font-family="'SF Mono', monospace" font-size="9" fill="#9ca3af">formats</text>

  <text x="275" y="198" font-family="'SF Mono', monospace" font-size="20" font-weight="700" fill="#1a1a1a">7</text>
  <text x="293" y="198" font-family="'SF Mono', monospace" font-size="9" fill="#9ca3af">archetypes</text>

  <!-- Right side: lego-colored mini bars -->
  <rect x="580" y="60" width="18" height="90" rx="4" fill="#F5CD2F"/>
  <rect x="606" y="40" width="18" height="110" rx="4" fill="#006CB7"/>
  <rect x="632" y="20" width="18" height="130" rx="4" fill="#E3000B"/>
  <rect x="658" y="35" width="18" height="115" rx="4" fill="#00852B"/>
  <rect x="684" y="55" width="18" height="95" rx="4" fill="#006CB7" opacity="0.7"/>
  <rect x="710" y="65" width="18" height="85" rx="4" fill="#F5CD2F" opacity="0.7"/>
  <rect x="736" y="75" width="18" height="75" rx="4" fill="#FF6D00" opacity="0.7"/>
  <rect x="762" y="85" width="18" height="65" rx="4" fill="#00852B" opacity="0.5"/>

  <text x="580" y="165" font-family="'SF Mono', monospace" font-size="8" fill="#9ca3af">16  24  35  50  70  85  135 200mm</text>

  <!-- Activity sparkline -->
  <polyline points="580,195 610,192 640,188 670,180 700,175 730,172 760,170 790,174 820,178 850,180" stroke="#006CB7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="580" y="210" font-family="'SF Mono', monospace" font-size="8" fill="#9ca3af">12-month activity</text>
</svg>
