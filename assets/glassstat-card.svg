<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <!-- White card -->
  <rect width="900" height="200" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Project name + subtitle on same line -->
  <text x="36" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#1a1a1a" letter-spacing="-1">glassstat</text>
  <text x="36" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">spotify wrapped for your camera gear</text>

  <!-- Description -->
  <text x="36" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">scan your photos, see how you actually shoot.</text>
  <text x="36" y="116" font-family="system-ui, sans-serif" font-size="12" fill="#9ca3af">focal lengths, aperture habits, archetypes, best-photo scoring.</text>
  <text x="36" y="138" font-family="system-ui, sans-serif" font-size="11" fill="#00852B">privacy-first · nothing leaves your machine</text>

  <!-- Tech pills -->
  <rect x="36" y="152" width="58" height="20" rx="10" fill="#006CB7" opacity="0.12"/>
  <text x="49" y="166" font-family="'SF Mono', monospace" font-size="9" fill="#006CB7">Python</text>

  <rect x="100" y="152" width="62" height="20" rx="10" fill="#00852B" opacity="0.12"/>
  <text x="112" y="166" font-family="'SF Mono', monospace" font-size="9" fill="#00852B">FastAPI</text>

  <rect x="168" y="152" width="50" height="20" rx="10" fill="#E3000B" opacity="0.12"/>
  <text x="179" y="166" font-family="'SF Mono', monospace" font-size="9" fill="#E3000B">React</text>

  <rect x="224" y="152" width="36" height="20" rx="10" fill="#F5CD2F" opacity="0.2"/>
  <text x="232" y="166" font-family="'SF Mono', monospace" font-size="9" fill="#b8860b">TS</text>

  <rect x="266" y="152" width="42" height="20" rx="10" fill="#FF6D00" opacity="0.12"/>
  <text x="275" y="166" font-family="'SF Mono', monospace" font-size="9" fill="#FF6D00">CLIP</text>

  <!-- Stats -->
  <rect x="500" y="40" width="1" height="120" fill="#e5e7eb"/>

  <text x="560" y="70" font-family="'SF Mono', monospace" font-size="36" font-weight="700" fill="#1a1a1a">29</text>
  <text x="560" y="88" font-family="'SF Mono', monospace" font-size="10" fill="#9ca3af">endpoints</text>

  <text x="680" y="70" font-family="'SF Mono', monospace" font-size="36" font-weight="700" fill="#1a1a1a">400+</text>
  <text x="680" y="88" font-family="'SF Mono', monospace" font-size="10" fill="#9ca3af">formats</text>

  <text x="560" y="140" font-family="'SF Mono', monospace" font-size="36" font-weight="700" fill="#1a1a1a">7</text>
  <text x="560" y="158" font-family="'SF Mono', monospace" font-size="10" fill="#9ca3af">archetypes</text>

  <text x="680" y="140" font-family="'SF Mono', monospace" font-size="36" font-weight="700" fill="#1a1a1a">6</text>
  <text x="680" y="158" font-family="'SF Mono', monospace" font-size="10" fill="#9ca3af">pages</text>
</svg>
