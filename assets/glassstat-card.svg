<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <!-- Card background -->
  <rect width="1200" height="400" rx="16" fill="#111"/>

  <!-- Subtle grain texture overlay -->
  <rect width="1200" height="400" rx="16" fill="url(#noise)" opacity="0.03"/>

  <!-- Accent glow -->
  <ellipse cx="900" cy="200" rx="300" ry="200" fill="#E8553D" opacity="0.05"/>

  <!-- Left content -->
  <text x="60" y="60" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="11" fill="#E8553D" letter-spacing="2">FEATURED PROJECT</text>

  <text x="60" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#fff" letter-spacing="-1">glassstat</text>
  <text x="60" y="150" font-family="system-ui, sans-serif" font-size="18" fill="#8b949e">Spotify Wrapped for your camera gear</text>

  <text x="60" y="200" font-family="system-ui, sans-serif" font-size="14" fill="#666" line-height="1.6">Scan your photo library and discover how you actually shoot.</text>
  <text x="60" y="222" font-family="system-ui, sans-serif" font-size="14" fill="#666">Focal length habits, aperture patterns, time-of-day heatmaps,</text>
  <text x="60" y="244" font-family="system-ui, sans-serif" font-size="14" fill="#666">photographer archetype classification, and a best-photo score.</text>

  <text x="60" y="285" font-family="system-ui, sans-serif" font-size="13" fill="#E8553D">Privacy-first — your photos never leave your machine.</text>

  <!-- Stats row -->
  <text x="60" y="340" font-family="'SF Mono', monospace" font-size="28" font-weight="700" fill="#fff">29</text>
  <text x="105" y="340" font-family="'SF Mono', monospace" font-size="11" fill="#555">API endpoints</text>

  <text x="230" y="340" font-family="'SF Mono', monospace" font-size="28" font-weight="700" fill="#fff">400+</text>
  <text x="300" y="340" font-family="'SF Mono', monospace" font-size="11" fill="#555">formats</text>

  <text x="390" y="340" font-family="'SF Mono', monospace" font-size="28" font-weight="700" fill="#fff">7</text>
  <text x="415" y="340" font-family="'SF Mono', monospace" font-size="11" fill="#555">archetypes</text>

  <!-- Star count badge -->
  <rect x="60" y="360" width="65" height="22" rx="4" fill="#21262d"/>
  <text x="78" y="375" font-family="'SF Mono', monospace" font-size="10" fill="#8b949e" text-anchor="middle">
  </text>

  <!-- Right side: mini dashboard mockup -->

  <!-- Focal length bars -->
  <rect x="700" y="55" width="440" height="175" rx="12" fill="#161b22"/>
  <text x="725" y="82" font-family="'SF Mono', monospace" font-size="10" fill="#484f58">FOCAL LENGTH</text>

  <rect x="725" y="100" width="30" height="110" rx="4" fill="#E8553D" opacity="0.15"/>
  <rect x="763" y="80" width="30" height="130" rx="4" fill="#E8553D" opacity="0.25"/>
  <rect x="801" y="55" width="30" height="155" rx="4" fill="#E8553D" opacity="0.9"/>
  <rect x="839" y="70" width="30" height="140" rx="4" fill="#E8553D" opacity="0.6"/>
  <rect x="877" y="95" width="30" height="115" rx="4" fill="#E8553D" opacity="0.3"/>
  <rect x="915" y="105" width="30" height="105" rx="4" fill="#0EA5E9" opacity="0.4"/>
  <rect x="953" y="120" width="30" height="90" rx="4" fill="#0EA5E9" opacity="0.25"/>
  <rect x="991" y="135" width="30" height="75" rx="4" fill="#0EA5E9" opacity="0.15"/>
  <rect x="1029" y="150" width="30" height="60" rx="4" fill="#0EA5E9" opacity="0.1"/>
  <rect x="1067" y="165" width="30" height="45" rx="4" fill="#0EA5E9" opacity="0.08"/>

  <text x="730" y="222" font-family="'SF Mono', monospace" font-size="8" fill="#484f58">16   24   35   50   70   85  100  135  200  400mm</text>

  <!-- Activity sparkline area -->
  <rect x="700" y="245" width="215" height="100" rx="12" fill="#161b22"/>
  <text x="725" y="270" font-family="'SF Mono', monospace" font-size="10" fill="#484f58">ACTIVITY</text>
  <polyline points="725,330 745,325 765,320 785,318 805,310 825,295 845,290 865,285 885,295 890,300" stroke="#E8553D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="725,330 745,325 765,320 785,318 805,310 825,295 845,290 865,285 885,295 890,300 890,335 725,335" fill="#E8553D" opacity="0.1"/>

  <!-- Top lens card -->
  <rect x="925" y="245" width="215" height="100" rx="12" fill="#161b22"/>
  <text x="950" y="270" font-family="'SF Mono', monospace" font-size="10" fill="#484f58">TOP LENS</text>
  <text x="950" y="300" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff">35mm f/1.4 GM</text>
  <text x="950" y="320" font-family="'SF Mono', monospace" font-size="11" fill="#555">4,231 shots</text>
  <rect x="950" y="328" width="165" height="4" rx="2" fill="#21262d"/>
  <rect x="950" y="328" width="165" height="4" rx="2" fill="#E8553D" opacity="0.8"/>

  <defs>
    <filter id="noise">
      <feTurbulence baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </defs>
</svg>
