name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: pastel-settings.json
      - name: Remove built-in language donut
        run: |
          FILE="profile-3d-contrib/profile-pastel-animate.svg"
          if [ -f "$FILE" ]; then
            python3 -c "
import re
with open('$FILE', 'r') as f:
    svg = f.read()
# Remove the language pie chart paths (arc segments with M...A...L...Z patterns after the radar)
# and the contribution/star/fork counts at the bottom
# Crop viewBox height from 850 to 520
svg = svg.replace('height=\"850\"', 'height=\"520\"')
svg = svg.replace('viewBox=\"0 0 1280 850\"', 'viewBox=\"0 0 1280 520\"')
with open('$FILE', 'w') as f:
    f.write(svg)
"
          fi
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated 3d contrib graph"; then
            git push
          fi
