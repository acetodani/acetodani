name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: pastel-settings.json
      - name: Crop to 3D blocks only
        run: |
          FILE="profile-3d-contrib/profile-pastel-animate.svg"
          if [ -f "$FILE" ]; then
            sed -i 's/viewBox="0 0 \([0-9]*\) [0-9]*"/viewBox="0 0 \1 440"/' "$FILE"
            sed -i 's/height="[0-9]*"/height="440"/' "$FILE"
          fi
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated 3d contrib graph"; then
            git push
          fi
