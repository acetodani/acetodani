name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: pastel-settings.json
      - name: Remove language donut from SVG
        run: |
          FILE="profile-3d-contrib/profile-pastel-animate.svg"
          if [ -f "$FILE" ]; then
            python3 << 'SCRIPT'
          import re
          with open("profile-3d-contrib/profile-pastel-animate.svg", "r") as f:
              svg = f.read()
          # Remove all pie chart arc paths (they have M...A...L...Z pattern with large numbers)
          svg = re.sub(r'<path d="M-?[\d.]+,-?[\d.]+A\d+,\d+.*?</path>', '', svg)
          # Remove the contributions/stars/forks row at the bottom
          svg = re.sub(r'<text[^>]*y="830"[^>]*>.*?</text>', '', svg)
          svg = re.sub(r'<g transform="translate\((608|736)[^"]*"[^>]*>.*?</g>', '', svg)
          # Shrink height to just blocks + radar
          svg = svg.replace('height="850"', 'height="520"')
          svg = svg.replace('viewBox="0 0 1280 850"', 'viewBox="0 0 1280 520"')
          with open("profile-3d-contrib/profile-pastel-animate.svg", "w") as f:
              f.write(svg)
          SCRIPT
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated 3d contrib graph"; then
            git push
          fi
